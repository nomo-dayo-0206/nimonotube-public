<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煮物tube</title>
    <style>
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #060b19;
            color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        header {
            width: 100%;
            max-width: 1200px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #4ea8de, #56cfe1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(78, 168, 222, 0.2);
        }
        .search-container {
            width: 100%;
            max-width: 650px;
            position: relative;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 30px;
            padding: 6px;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.05), 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 1.1rem;
            padding: 12px 25px;
        }
        .search-input::placeholder {
            color: #64748b;
        }
        .search-button {
            background: linear-gradient(135deg, #4ea8de, #56cfe1);
            border: none;
            border-radius: 25px;
            color: #060b19;
            font-weight: 700;
            padding: 12px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(86, 207, 225, 0.3);
        }
        .search-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(86, 207, 225, 0.5);
            opacity: 0.95;
        }
        main {
            width: 100%;
            max-width: 1200px;
            padding: 0 20px 50px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .player-section {
            width: 100%;
            display: none;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 24px;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 16px;
            overflow: hidden;
            background: #000000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }
        .video-info {
            margin-top: 20px;
        }
        .video-active-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .video-active-meta {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
        }
        .card {
            background: rgba(20, 30, 55, 0.5);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(78, 168, 222, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(78, 168, 222, 0.1);
        }
        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #0f172a;
        }
        .thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .card:hover .thumbnail {
            transform: scale(1.04);
        }
        .duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(6, 11, 25, 0.85);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }
        .card-content {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.5;
            margin: 0 0 12px 0;
            color: #f1f5f9;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.85rem;
        }
        .card-channel {
            font-size: 0.85rem;
            color: #4ea8de;
            font-weight: 500;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            justify-content: space-between;
            margin-top: auto;
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: #94a3b8;
            padding: 50px 0;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">煮物tube</div>
        <div class="search-container">
            <input type="text" id="query" class="search-input" placeholder="キーワードを入力してください...">
            <button id="searchBtn" class="search-button">検索</button>
        </div>
    </header>

    <main>
        <section id="playerSection" class="player-section">
            <div class="video-wrapper">
                <video id="mainPlayer" controls autoplay></video>
            </div>
            <div class="video-info">
                <h2 id="activeTitle" class="video-active-title"></h2>
                <div id="activeMeta" class="video-active-meta"></div>
            </div>
        </section>

        <div id="loading" class="loading">検索中...</div>
        <section id="grid" class="grid-container"></section>
    </main>

    <script>
        const searchInput = document.getElementById('query');
        const searchBtn = document.getElementById('searchBtn');
        const grid = document.getElementById('grid');
        const loading = document.getElementById('loading');
        const playerSection = document.getElementById('playerSection');
        const mainPlayer = document.getElementById('mainPlayer');
        const activeTitle = document.getElementById('activeTitle');
        const activeMeta = document.getElementById('activeMeta');

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            grid.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                loading.style.display = 'none';

                if (data && data.results) {
                    renderResults(data.results);
                }
            } catch (error) {
                loading.style.display = 'none';
            }
        }

        function renderResults(results) {
            results.forEach(video => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img class="thumbnail" src="${video.thumbnails.medium.url}" alt="">
                        <span class="duration">${video.duration}</span>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${video.title}</h3>
                        <div class="card-channel">${video.channel}</div>
                        <div class="card-meta">
                            <span>${Number(video.viewCount).toLocaleString()} 回視聴</span>
                            <span>${video.publishedAgo}</span>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => playVideo(video));
                grid.appendChild(card);
            });
        }

        async function playVideo(video) {
            try {
                const response = await fetch(`/api/stream/${video.id}?quality=360p`);
                const data = await response.json();
                
                if (data && data.url) {
                    mainPlayer.src = data.url;
                    activeTitle.textContent = video.title;
                    activeMeta.textContent = `${video.channel} • ${Number(video.viewCount).toLocaleString()} 回視聴 • ${video.publishedText}`;
                    playerSection.style.display = 'block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (error) {
                alert('動画の読み込みに失敗しました。');
            }
        }
    </script>
</body>
</html>
